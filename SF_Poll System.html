<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>

<style>
body { font-family: sans-serif; background:#f4f4f4; margin:0; }
.container { max-width:60%; margin:20px auto; background:#fff; padding:20px; border-radius:12px; }
h2 { text-align:center; 
font-size: 20px;}

input, textarea {
  width:100%; padding:12px; margin-top:8px;
  border:1px solid #ddd; border-radius:8px;
  box-sizing:border-box;
}

.radio-group { margin-top:10px; }
.radio-group label { display:block; margin:8px 0; }

/* OPTION BUTTON STYLE */
.option-card {
    display: block;
    background: #eee;
    padding: 14px;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}

/* Hide default radio */
/* Default option */
.option-card {
    display: block;
    background: #eee;
    padding: 14px;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
    border: none; /* ❌ remove border */
}

/* Hide radio */
.option-card input {
    display: none;
}

/* Text */
.option-card span {
    font-size: 14px;
    color: #333;
}

/* Hover */
.option-card:hover {
    background: #e0e0e0;
}

/* ✅ Selected (NO extra box, just color change) */
.option-card input:checked + span {
    color: #fff;
}

.option-card input:checked {
    display: none;
}

.option-card:has(input:checked) {
    background: #222;
}

.option-card input:checked + span {
    background: #222;
    color: #fff;
    display: block;
    border-radius: 8px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

/* Cancel button (like unselected option) */
.cancel {
  background: #eee;
  color: #333;
}

.cancel:hover {
  background: #e0e0e0;
}

/* Submit button (like selected option) */
.submit {
  background: #222;
  color: #fff;
}

/* Hover effect same smooth transition */
.submit:hover {
  background: #333;
}
</style>
</head>

<body>

<div class="container">
<h2>Samarthya Florencia Cop. Housing Service Society Ltd</h2>

<form id="form">

<input type="text" id="name" placeholder="Owner Name" required>

<input type="number" id="house" placeholder="House ID (Numbers only)" required>

<input type="email" id="email" placeholder="Email" required>

<h3 id="question">Loading...</h3>

<div id="options" class="radio-group"></div>

<textarea id="comment" placeholder="Comment (optional)"></textarea>

<div class="btn-group">
  <button type="button" class="cancel" onclick="document.getElementById('form').reset()">Cancel</button>
  <button type="submit" class="submit">Submit</button>
</div>

</form>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyQ42pWTsRqeyOajddNo79ow3nwOG0G9pNL3JG8yCzwF26BVrWwquk9DMjdGfGA2UM/exec";

// Fetch Poll
fetch(scriptURL)
.then(res => res.json())
.then(data => {
  document.getElementById("question").innerText = data.question;

  const optionsDiv = document.getElementById("options");
  data.options.forEach(opt => {
    if(opt){
      optionsDiv.innerHTML += `
  <label class="option-card">
    <input type="radio" name="vote" value="${opt}" required>
    <span>${opt}</span>
  </label>
`;
    }
  });

  window.pollID = data.pollID;
});

// Submit
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const house = document.getElementById("house").value;

  if (!/^[0-9]+$/.test(house)) {
    alert("House ID must be numbers only");
    return;
  }

  const vote = document.querySelector('input[name="vote"]:checked').value;

  document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    house: document.getElementById("house").value,
    email: document.getElementById("email").value,
    vote: document.querySelector('input[name="vote"]:checked').value,
    comment: document.getElementById("comment").value,
    pollID: window.pollID,
    date: new Date().toLocaleDateString(),
    time: new Date().toLocaleTimeString()
  };

  // ✅ CORRECT FETCH (no headers)
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    console.log(res);

    if(res.includes("DUPLICATE")){
      alert("You have already voted");
    } else if(res.includes("SUCCESS")){
      alert("Vote submitted");
    } else {
      alert(res);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Network / Script error");
  });

});

});

</script>

</body>
</html>
